name: Release binaries

# Build the standalone executables and attach them to a GitHub Release.
# Triggered by pushing a version tag (e.g. `git tag v1.0.0 && git push --tags`),
# or manually from the Actions tab.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # pkg cross-builds every target in package.json (mac arm64 / mac x64 / win x64)
      # from a single Linux runner — the app has no native dependencies.
      - name: Build binaries
        run: npx --yes @yao-pkg/pkg@latest . --out-path dist

      - name: List output
        run: ls -la dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arbhar-binaries
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
