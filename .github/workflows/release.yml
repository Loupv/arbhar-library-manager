name: Release binaries

# Build the standalone executables and attach them to a GitHub Release.
# Triggered by pushing a version tag (e.g. `git tag v1.0.0 && git push --tags`),
# or manually from the Actions tab.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # Must run on macOS: pkg ad-hoc code-signs the macOS binaries here, otherwise
    # Apple Silicon kills unsigned executables ("zsh: killed"). pkg still cross-builds
    # the Windows .exe from macOS (no native deps).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build binaries (mac arm64 / mac x64 / win x64)
        run: npx --yes @yao-pkg/pkg@latest . --out-path dist

      - name: Verify macOS code signatures
        run: |
          codesign -dv dist/arbhar-library-editor-macos-arm64 2>&1 | grep -i adhoc
          codesign -dv dist/arbhar-library-editor-macos-x64   2>&1 | grep -i adhoc

      # Ship .zip archives, not bare files: macOS binaries have no extension and lose
      # their executable bit over a raw download — zipping keeps +x and makes the asset clear.
      - name: Package
        run: |
          cd dist
          chmod +x arbhar-library-editor-macos-arm64 arbhar-library-editor-macos-x64
          zip -j arbhar-macOS-AppleSilicon.zip arbhar-library-editor-macos-arm64
          zip -j arbhar-macOS-Intel.zip        arbhar-library-editor-macos-x64
          zip -j arbhar-Windows-x64.zip        arbhar-library-editor-win-x64.exe
          ls -la

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arbhar-binaries
          path: dist/*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
